<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>AdultQuest MVP</title>

  <link rel="stylesheet" href="/frontend/css/style.css">
</head>

<body>

  <!-- ========================= -->
  <!-- LOGIN SCREEN -->
  <!-- ========================= -->
  <section id="login-screen" class="background">

    <div class="login-box">
      <h2>Login</h2>

      <button id="login-btn" class="google-btn">
        <img src="/frontend/assets/google.svg" alt="Google">
        <span>Entrar com Google</span>
      </button>

      <p id="login-error"></p>
    </div>

  </section>

  <!-- ========================= -->
  <!-- MENU INICIAL -->
  <!-- ========================= -->
  <section id="intro-screen">

    <!-- CENÁRIO -->
    <div id="scene">
      <div class="background"></div>
    </div>

    <!-- BOTÕES -->
    <div id="menu-buttons">

      <button id="start-button" class="menu-button">
        Start
      </button>

      <button id="option-button" class="menu-button">
        Options
      </button>

    </div>

    <!-- ========================= -->
    <!-- OPTIONS -->
    <!-- ========================= -->
    <div id="options-screen" class="overlay hidden">

      <div class="overlay-content option-panel">

        <h2>Options</h2>

        <!-- VOLUME -->
        <div class="option-row">

          <span>Volume</span>

          <div class="option-controls">
            <button id="volume-down" class="opt-btn">-</button>
            <span id="volume-value">50%</span>
            <button id="volume-up" class="opt-btn">+</button>
          </div>

        </div>

        <!-- LEGENDA -->
        <div class="option-row">

          <span>Legenda</span>

          <div class="option-controls">
            <button id="font-down" class="opt-btn">-</button>
            <span id="font-value">16px</span>
            <button id="font-up" class="opt-btn">+</button>
          </div>

        </div>

        <!-- IDIOMA -->
        <div class="option-row">

          <span>Idioma</span>

          <select id="language-select">
            <option value="pt-br">Português-BR</option>
            <option value="en">English</option>
            <option value="es">Español</option>
          </select>

        </div>

        <!-- VOLTAR -->
        <button class="close-button">
          Voltar
        </button>

      </div>

    </div>

  </section>

  <!-- ========================= -->
  <!-- SCRIPTS -->
  <!-- ========================= -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="/backend/js/env.js"></script>
  <script src="/backend/js/supabase-config.js"></script>
  <script src="/backend/js/api.js"></script>

  <script src="/frontend/js/game.js"></script>
  <script src="/frontend/js/login.js"></script>

</body>

</html>
