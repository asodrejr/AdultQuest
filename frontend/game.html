<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest - Aventura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-screen">
    <img src="assets/backgrounds/character_standing.png" alt="Cenário e Personagem" class="background">

    <div id="attribute-panel">
      <h2>ATRIBUTOS</h2>
      <div id="warning-msg"></div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-chest-50.png" alt="">
          Físico</label>
        <div class="controls">
          <button onclick="changeAttr('attr_body', -1)">-</button>
          <span id="attr_body">1</span>
          <button onclick="changeAttr('attr_body', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-mind-50.png" alt="">
          Mente</label>
        <div class="controls">
          <button onclick="changeAttr('attr_mind', -1)">-</button>
          <span id="attr_mind">1</span>
          <button onclick="changeAttr('attr_mind', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-emotional-intelligence-50.png" alt="">
          Emocional</label>
        <div class="controls">
          <button onclick="changeAttr('attr_emotions', -1)">-</button>
          <span id="attr_emotions">1</span>
          <button onclick="changeAttr('attr_emotions', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-social-50.png" alt="">
          Social</label>
        <div class="controls">
          <button onclick="changeAttr('attr_social', -1)">-</button>
          <span id="attr_social">1</span>
          <button onclick="changeAttr('attr_social', 1)">+</button>
        </div>
      </div>

      <div id="attribute-footer">
        <span>XP: <span id="xp">0</span></span>
        <span>PONTOS: <span id="points">2</span></span>
      </div>

      <div id="attribute-actions" style="margin-top: 1rem; text-align:center; display: flex; flex-direction: column; gap: 10px;">
        <button id="save-button" style="background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Salvar Progresso</button>
        <button id="advance-button">Avançar para o Mapa</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../backend/js/env.js"></script>
  <script src="../backend/js/supabase-config.js"></script>
  <script src="../backend/js/api.js"></script>
  <script src="js/game.js"></script>
  <script src="js/login.js"></script> <script></script>
  <script>
    // Botão chama a função definida no game.js
    if (document.getElementById('save-button')) {
            document.getElementById('save-button').addEventListener('click', handleSave);
        }
        
        if (document.getElementById('advance-button')) {
            document.getElementById('advance-button').addEventListener('click', () => {
                window.location.href = 'map.html';
            });
        }
  </script>

</body>
</html>
