<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest MVP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="intro-screen">

    <div id="scene">
      <div class="background"></div>
    </div>

   <div id="menu-buttons">
      <button id="start-button" class="menu-button">Start</button>
      <button id="load-button" class="menu-button">Load</button>
      <button id="option-button" class="menu-button">Options</button>
    </div>

    <!-- OVERLAY LOAD -->
    <div id="load-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Load Game</h2>
        <p>Aqui você pode carregar seu progresso.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

     <!-- OVERLAY OPTIONS -->
    <div id="options-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Options</h2>
        <p>Configurações do jogo.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

  </div>

  
  
</div>
    <script>
      document.getElementById('start-button').addEventListener('click', function() {window.location.href = 'game.html';
      });

      const loadScreen= document.getElementById("load-screen");
      const optionsScreen= document.getElementById("options-screen");

      document.getElementById('load-button').addEventListener('click', function() {loadScreen.classList.remove("hidden");
      });

      document.getElementById('option-button').addEventListener('click', function() {optionsScreen.classList.remove("hidden");
      });

      //Fechar Overlays
      document.querySelectorAll(".close-button").forEach(button=>{
        button.addEventListener("click", ()=>{
          button.closest(".overlay").classList.add("hidden");
        });
      });

      //Fechando clicando fora do conteúdo
      document.querySelectorAll(".overlay").forEach(overlay =>{
        overlay.addEventListener("click", (e) =>{
          if(e.target === overlay){
            overlay.classList.add("hidden");
          }
        });
      });

    </script>
</body>
</html>
