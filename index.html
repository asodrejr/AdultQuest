<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest MVP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="intro-screen">

    <div id="scene">
      <div class="background"></div>
    </div>

   <div id="menu-buttons">
      <button id="start-button" class="menu-button">Start</button>
      <button id="load-button" class="menu-button">Load</button>
      <button id="option-button" class="menu-button">Options</button>
    </div>

    <!-- OVERLAY LOAD -->
    <div id="load-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Load Game</h2>
        <p>Aqui você pode carregar seu progresso.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

     <!-- OVERLAY OPTIONS -->
    <div id="options-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Options</h2>
        <p>Configurações do jogo.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

  </div>
  
</div>
    <script src="script.js"></script>
</body>
</html>
