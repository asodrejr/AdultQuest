<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest MVP - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="background">
    <div class="login-box">
      <h2>Login</h2>

      <button id="login-btn" class="google-btn">
      <img src="assets/google-icon.svg" alt="Google" />
        Entrar com Google
      </button>

      <p id="login-error"></p>
    </div>
  </div>

  <div id="intro-screen">
    <div id="scene">
      <div class="background"></div>
    </div>

   <div id="menu-buttons">
      <button id="start-button" class="menu-button">Start</button>
      <button id="load-button" class="menu-button">Load</button>
      <button id="option-button" class="menu-button">Options</button>
    </div>

    <!-- OVERLAY LOAD -->
    <div id="load-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Load Game</h2>
        <p>Aqui você pode carregar seu progresso.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

     <!-- OVERLAY OPTIONS -->
    <div id="options-screen" class="overlay hidden">
      <div class="overlay-content">
        <h2>Options</h2>
        <p>Configurações do jogo.</p>
        <button class="close-button">Voltar</button>
      </div>
    </div>

  </div>
  
</div>
    <script src="https://cdn.jsdelivr.net/npm/@supabse-js@2"></script>
    <script src="js/env.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
