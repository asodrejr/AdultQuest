<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest - Aventura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-screen">
    <img src="assets/backgrounds/character_standing.png" alt="Cenário e Personagem" class="background">

    <div id="attribute-panel">
      <h2>ATRIBUTOS</h2>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-chest-50.png" alt="">
          Físico</label>
        <div class="controls">
          <button onclick="changeAttr('attr_body', -1)">-</button>
          <span id="attr_body">1</span>
          <button onclick="changeAttr('attr_body', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-mind-50.png" alt="">
          Mente</label>
        <div class="controls">
          <button onclick="changeAttr('attr_mind', -1)">-</button>
          <span id="attr_mind">1</span>
          <button onclick="changeAttr('attr_mind', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-emotional-intelligence-50.png" alt="">
          Emocional</label>
        <div class="controls">
          <button onclick="changeAttr('attr_emotions', -1)">-</button>
          <span id="attr_emotions">1</span>
          <button onclick="changeAttr('attr_emotions', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>
          <img src="./assets/icons/icons8-social-50.png" alt="">
          Social</label>
        <div class="controls">
          <button onclick="changeAttr('attr_social', -1)">-</button>
          <span id="attr_social">1</span>
          <button onclick="changeAttr('attr_social', 1)">+</button>
        </div>
      </div>

      <div id="attribute-footer">
        <span>XP: <span id="xp">0</span></span>
        <span>PONTOS: <span id="points">2</span></span>
      </div>

      <div id="attribute-actions" style="margin-top: 1rem; text-align:center; display: flex; flex-direction: column; gap: 10px;">
        <button id="save-button" style="background-color: #28a745; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Salvar Progresso</button>
        <button id="advance-button">Avançar para o Mapa</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/env.js"></script>
  <script src="js/supabase-config.js"></script>
  
  <script src="js/game.js"></script>

  <script>
    // Lógica para o botão de Salvar (Integrada ao seu Banco de Dados)
    document.getElementById('save-button').addEventListener('click', async function() {
        const { data: { user } } = await window.supabaseClient.auth.getUser();
        
        if (!user) {
            alert("Sessão expirada. Faça login novamente.");
            window.location.href = 'index.html';
            return;
        }

        // Captura todos os valores atuais da tela
        const gameState = {
            attr_body: parseInt(document.getElementById('attr_body').innerText),
            attr_mind: parseInt(document.getElementById('attr_mind').innerText),
            attr_emotions: parseInt(document.getElementById('attr_emotions').innerText),
            attr_social: parseInt(document.getElementById('attr_social').innerText),
            xp: parseInt(document.getElementById('xp').innerText),
            points: parseInt(document.getElementById('points').innerText)
        };

        // Envia para a tabela game_saves que criamos no Supabase
        const { error } = await window.supabaseClient
            .from('game_saves')
            .insert([{ 
                profile_id: user.id, 
                save_name: 'Manual Save', 
                game_state: gameState 
            }]);

        if (error) {
            console.error("Erro ao salvar no banco:", error);
            alert("Erro técnico ao salvar.");
        } else {
            alert("Progresso da Vida Adulta salvo!");
        }
    });

    // Navegação original
    document.getElementById('advance-button').addEventListener('click', function() {
        window.location.href = 'map.html';
    });
  </script>
</body>
</html>
