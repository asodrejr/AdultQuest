<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdultQuest - Aventura</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-screen">
    <!-- Fundo com personagem integrado -->
    <img src="assets/backgrounds/character_standing.png" alt="Cenário e Personagem" class="background">

    <!-- Painel de atributos -->
    <div id="attribute-panel">
      <h2>ATRIBUTOS</h2>

      <div class="attr">
        <label>Dinheiro</label>
        <div class="controls">
          <button onclick="changeAttr('money', -1)">-</button>
          <span id="money">1</span>
          <button onclick="changeAttr('money', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>Energia</label>
        <div class="controls">
          <button onclick="changeAttr('energy', -1)">-</button>
          <span id="energy">1</span>
          <button onclick="changeAttr('energy', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>Estresse</label>
        <div class="controls">
          <button onclick="changeAttr('stress', -1)">-</button>
          <span id="stress">1</span>
          <button onclick="changeAttr('stress', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>Saúde</label>
        <div class="controls">
          <button onclick="changeAttr('health', -1)">-</button>
          <span id="health">1</span>
          <button onclick="changeAttr('health', 1)">+</button>
        </div>
      </div>

      <div class="attr">
        <label>Relacionamentos</label>
        <div class="controls">
          <button onclick="changeAttr('relationships', -1)">-</button>
          <span id="relationships">1</span>
          <button onclick="changeAttr('relationships', 1)">+</button>
        </div>
      </div>

      <div id="attribute-footer">
        <span>XP: <span id="xp">0</span></span>
        <span>PONTOS: <span id="points">2</span></span>
      </div>

      <div id="attribute-actions" style="margin-top: 1rem; text-align:center;">
        <button id="advance-button">Avançar para o Mapa</button>
      </div>
    </div>
  </div>

  <!-- Primeiro carrega seu JS do jogo -->
  <script src="js/game.js"></script>

  <!-- Depois o script inline para o botão avançar -->
  <script>
    document.getElementById('advance-button').addEventListener('click', function() {
        window.location.href = 'map.html';
    });
  </script>
</body>
</html>
